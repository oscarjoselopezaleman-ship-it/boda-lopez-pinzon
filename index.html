:root{

var ALL=N.concat(G);
var TOTAL=ALL.reduce(function(a,g){return a+g.q;},0);

var ST={
  none:{l:"Sin contacto",c:"#6b7280",bg:"#f3f4f6",d:"#d1d5db"},
  seen:{l:"Vio invitación",c:"#1d6e8f",bg:"#daf0fa",d:"#50b8d8"},
  conf:{l:"Confirmó ✓",c:"#1d6b42",bg:"#d0f0e0",d:"#40c878"},
  pend:{l:"Pendiente",c:"#965f10",bg:"#fdefd0",d:"#e8a830"},
  no:  {l:"No asiste",c:"#882020",bg:"#fce8e8",d:"#e07070"}
};
var FK=["todos","none","seen","conf","pend","no"];
var FL=["Todos","Sin contacto","Vieron","Confirmaron","Pendientes","No asisten"];
var tab="todos",filt="todos",drwr=null,S={};

document.getElementById("sT").textContent=TOTAL;

function setSyncStatus(st){
  var dot=document.getElementById("syncDot");
  var txt=document.getElementById("syncTxt");
  dot.className="sync-dot"+(st==="on"?"":st==="off"?" off":" loading");
  txt.textContent=st==="on"?"Sincronizado en tiempo real":st==="off"?"Sin conexión":"Conectando…";
}

function updStats(){
  var seen=0,conf=0,pend=0,n=ALL.length;
  ALL.forEach(function(g){
    var s=(S[g.id]||{}).s||"none";
    if(s!=="none")seen++;
    if(s==="conf")conf++;
    if(s==="pend")pend++;
  });
  document.getElementById("sS").textContent=seen;
  document.getElementById("sC").textContent=conf;
  document.getElementById("sP").textContent=pend;
  var sp=Math.round(seen/n*100),cp=Math.round(conf/n*100);
  document.getElementById("pbS").style.width=sp+"%";
  document.getElementById("pbC").style.width=cp+"%";
  document.getElementById("ppS").textContent=sp+"%";
  document.getElementById("ppC").textContent=cp+"%";
}

window.setTab=function(t){
  tab=t;
  ["todos","novia","novio"].forEach(function(k){
    document.getElementById("tab-"+k).classList.toggle("on",k===t);
  });
  render();
};

function buildF(){
  var h="";
  FK.forEach(function(k,i){
    h+='<button class="f-btn'+(filt===k?" on":"")+'" onclick="setF(\''+k+'\')">'+FL[i]+'</button>';
  });
  document.getElementById("fBar").innerHTML=h;
}
window.setF=function(k){filt=k;buildF();render();};

function pool(){return tab==="novia"?N:tab==="novio"?G:ALL;}

function gs(id){return S[id]||{s:"none",note:""};}

function render(){
  var q=document.getElementById("qInput").value.toLowerCase().trim();
  var p=pool();
  var vis=p.filter(function(g){
    var mq=!q||g.n.toLowerCase().indexOf(q)>=0;
    var mf=filt==="todos"||gs(g.id).s===filt;
    return mq&&mf;
  });
  var w=document.getElementById("listWrap");
  if(!vis.length){w.innerHTML='<div class="empty-msg">No se encontraron invitados</div>';return;}
  var h="";
  if(tab==="todos"&&filt==="todos"&&!q){
    var qN=N.reduce(function(a,g){return a+g.q;},0);
    var qG=G.reduce(function(a,g){return a+g.q;},0);
    h+='<div class="sec-hd"><span>Lista de la Novia · '+qN+' personas</span></div>';
    h+='<div class="list">'+cards(N)+'</div>';
    h+='<div class="sec-hd"><span>Lista del Novio · '+qG+' personas</span></div>';
    h+='<div class="list">'+cards(G)+'</div>';
  } else {
    h='<div class="list">'+cards(vis)+'</div>';
  }
  w.innerHTML=h;
}

function cards(arr){
  return arr.map(function(g,i){
    var d=gs(g.id),st=ST[d.s]||ST.none;
    var wp=g.p&&g.p.length>3?"https://wa.me/"+g.p.replace(/\D/g,""):"";
    return '<div class="card" style="border-left-color:'+st.d+'" onclick="openD(\''+g.id+'\')">'
      +'<div class="card-num">'+(i+1)+'</div>'
      +'<div class="card-body">'
        +'<div class="card-name">'+g.n+'</div>'
        +'<div class="card-meta">'
          +'<span class="badge" style="background:'+st.bg+';color:'+st.c+'">'+st.l+'</span>'
          +'<span class="card-qty">'+g.q+' '+(g.q===1?"persona":"personas")+'</span>'
        +'</div>'
        +(d.note?'<div class="card-note">📝 '+d.note+'</div>':"")
      +'</div>'
      +(wp?'<a class="wa-mini" href="'+wp+'" target="_blank" onclick="event.stopPropagation()">💬 WA</a>':"")
      +'<div class="arr">›</div></div>';
  }).join("");
}

window.onQ=function(){
  var q=document.getElementById("qInput").value;
  document.getElementById("clrBtn").style.display=q?"block":"none";
  render();
};
window.clrQ=function(){
  document.getElementById("qInput").value="";
  document.getElementById("clrBtn").style.display="none";
  render();
};

window.openD=function(id){
  var g=ALL.filter(function(x){return x.id===id;})[0];
  drwr=id;
  var lista=N.some(function(x){return x.id===id;})?"Novia":"Novio";
  document.getElementById("dLista").textContent="Lista "+lista;
  document.getElementById("dName").textContent=g.n;
  document.getElementById("dQty").textContent=g.q+" "+(g.q===1?"persona":"personas");
  document.getElementById("noteTA").value=gs(id).note||"";
  buildSG(id);buildWA(g);
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
};

function buildSG(id){
  var cur=gs(id).s,h="";
  ["none","seen","conf","pend","no"].forEach(function(k){
    var v=ST[k],on=cur===k;
    h+='<button class="s-btn'+(on?" on":"")+'" onclick="setSt(\''+id+'\',\''+k+'\')"'
      +(on?' style="border-color:'+v.d+';background:'+v.bg+';color:'+v.c+'"':"")+' >'
      +'<span class="dot" style="background:'+(on?v.d:"var(--cream-dd)")+'"></span>'+v.l+'</button>';
  });
  document.getElementById("sGrid").innerHTML=h;
}

function buildWA(g){
  var w=document.getElementById("waWrap");
  if(g.p&&g.p.length>3){
    var url="https://wa.me/"+g.p.replace(/\D/g,"");
    w.innerHTML='<div class="drw-lbl">WhatsApp</div>'
      +'<div class="wa-box"><div class="wa-info">'
      +'<div class="wa-lbl">'+g.n+'</div><div class="wa-num">'+g.p+'</div></div>'
      +'<a class="wa-open" href="'+url+'" target="_blank">💬 Abrir</a></div>';
  } else { w.innerHTML=""; }
}

window.setSt=function(id,s){
  if(!S[id])S[id]={s:"none",note:""};
  S[id].s=s;
  saveGuest(id);buildSG(id);updStats();
};

window.closeD=function(){
  if(drwr){
    if(!S[drwr])S[drwr]={s:"none",note:""};
    S[drwr].note=document.getElementById("noteTA").value.trim();
    saveGuest(drwr);
  }
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow="";
  drwr=null;render();
};

window.saveD=function(){
  window.closeD();
  var t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2000);
};

async function saveGuest(id){
  try{await setDoc(doc(db,"guests",id),S[id]);}catch(e){console.error(e);}
}

// ── CONNECT ──
function startFirestore(){
  var colRef=collection(db,"guests");
  // Initial load
  getDocs(colRef).then(function(snap){
    S={};
    snap.forEach(function(d){S[d.id]=d.data();});
    ALL.forEach(function(g){if(!S[g.id])S[g.id]={s:"none",note:""};});
    setSyncStatus("on");render();updStats();
  }).catch(function(e){
    setSyncStatus("off");
    ALL.forEach(function(g){if(!S[g.id])S[g.id]={s:"none",note:""};});
    render();updStats();
  });
  // Real-time listener
  onSnapshot(colRef,function(snap){
    S={};
    snap.forEach(function(d){S[d.id]=d.data();});
    ALL.forEach(function(g){if(!S[g.id])S[g.id]={s:"none",note:""};});
    setSyncStatus("on");render();updStats();
  },function(e){setSyncStatus("off");console.error(e);});
}

buildF();render();

signInAnonymously(auth).then(function(){
  startFirestore();
}).catch(function(e){
  console.error("Auth:",e);
  startFirestore();
});
</script>
